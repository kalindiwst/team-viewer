<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Team Viewer">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <title>Team Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 20px 24px;
      border-bottom: 1px solid #2a2a4a;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }

    .header-stats { font-size: 13px; color: #8888aa; margin-bottom: 12px; }
    .header-stats span { color: #6c63ff; font-weight: 600; }

    .search-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .search-bar input {
      flex: 1; min-width: 180px; padding: 10px 14px; border-radius: 8px;
      border: 1px solid #2a2a4a; background: #111; color: #e0e0e0;
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: #6c63ff; }
    .search-bar input::placeholder { color: #555; }

    .btn {
      padding: 10px 16px; border-radius: 8px; border: none;
      background: #6c63ff; color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: background 0.2s;
    }
    .btn:hover { background: #5a52d5; }
    .btn-outline { background: transparent; border: 1px solid #2a2a4a; color: #8888aa; }
    .btn-outline:hover { background: #1a1a2e; color: #e0e0e0; }
    .btn-danger { background: #dc3545; }
    .btn-danger:hover { background: #c82333; }
    .btn-success { background: #28a745; }
    .btn-success:hover { background: #218838; }
    .btn-warning { background: #ffa726; color: #000; }
    .btn-warning:hover { background: #fb8c00; }

    .breadcrumb {
      padding: 10px 24px; background: #0f0f1a; border-bottom: 1px solid #1a1a2e;
      font-size: 13px; color: #666; display: none;
    }
    .breadcrumb.active { display: block; }
    .breadcrumb span { cursor: pointer; color: #6c63ff; }
    .breadcrumb span:hover { color: #8a83ff; }
    .breadcrumb .sep { color: #333; cursor: default; margin: 0 6px; }
    .breadcrumb .current { color: #e0e0e0; cursor: default; }

    .container { max-width: 900px; margin: 0 auto; padding: 16px; }

    .top-actions { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }

    .person-card {
      background: #111119; border: 1px solid #1e1e30; border-radius: 10px;
      margin-bottom: 8px; overflow: hidden; transition: border-color 0.2s;
    }
    .person-card:hover { border-color: #2a2a4a; }
    .person-card.highlight { border-color: #6c63ff; background: #14142a; }
    .person-card.unfunded { border-left: 3px solid #dc3545; }
    .person-card.funded-card { border-left: 3px solid #28a745; }
    .person-card.moving { border: 2px dashed #ffa726; }

    .person-header {
      display: flex; align-items: center; padding: 14px 16px;
      gap: 12px; user-select: none;
    }

    .avatar {
      width: 38px; height: 38px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-weight: 700;
      font-size: 15px; color: #fff; flex-shrink: 0; position: relative;
    }

    .funded-dot {
      position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px;
      border-radius: 50%; border: 2px solid #111119;
    }
    .funded-dot.yes { background: #28a745; }
    .funded-dot.no { background: #dc3545; }

    .person-info { flex: 1; min-width: 0; }
    .person-name {
      font-size: 15px; font-weight: 600; color: #e0e0e0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .person-meta { font-size: 12px; color: #666; margin-top: 2px; }
    .person-meta .tag {
      display: inline-block; padding: 1px 6px; border-radius: 4px;
      background: #1a1a2e; color: #6c63ff; font-size: 11px; font-weight: 600; margin-right: 4px;
    }
    .person-meta .funded-tag { background: #1a2e1a; color: #28a745; }
    .person-meta .unfunded-tag { background: #2e1a1a; color: #dc3545; }

    .action-btns { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; }

    .action-btn {
      padding: 5px 10px; border-radius: 6px; border: 1px solid #2a2a4a;
      background: transparent; color: #8888aa; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .action-btn:hover { background: #1a1a2e; color: #e0e0e0; }
    .action-btn.move-here { border-color: #ffa726; color: #ffa726; }
    .action-btn.move-here:hover { background: #ffa726; color: #000; }

    .expand-icon {
      width: 24px; height: 24px; display: flex; align-items: center;
      justify-content: center; color: #555; flex-shrink: 0; font-size: 18px;
      transition: transform 0.2s; cursor: pointer;
    }
    .expand-icon.open { transform: rotate(90deg); }

    .person-children { padding: 0 0 8px 24px; display: none; }
    .person-children.open { display: block; }

    .no-results { text-align: center; padding: 60px 20px; color: #555; font-size: 15px; }

    /* Modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); z-index: 200; display: none;
      align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #16162a; border: 1px solid #2a2a4a; border-radius: 12px;
      padding: 24px; width: 90%; max-width: 420px;
    }
    .modal h2 { font-size: 18px; color: #fff; margin-bottom: 16px; }
    .modal input {
      width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #2a2a4a;
      background: #111; color: #e0e0e0; font-size: 14px; outline: none; margin-bottom: 12px;
    }
    .modal input:focus { border-color: #6c63ff; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal label { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; color: #ccc; font-size: 14px; cursor: pointer; }
    .modal label input[type="checkbox"] { width: auto; margin: 0; }

    .move-banner {
      background: #2e2200; border: 1px solid #ffa726; border-radius: 8px;
      padding: 12px 16px; margin-bottom: 12px; display: none;
      align-items: center; justify-content: space-between; gap: 12px;
    }
    .move-banner.active { display: flex; }
    .move-banner span { color: #ffa726; font-size: 14px; font-weight: 600; }

    .av-1 { background: #6c63ff; } .av-2 { background: #ff6b6b; }
    .av-3 { background: #ffa726; } .av-4 { background: #26a69a; }
    .av-5 { background: #42a5f5; } .av-6 { background: #ab47bc; }
    .av-7 { background: #ec407a; } .av-8 { background: #7e57c2; }

    @media (max-width: 600px) {
      header { padding: 16px; }
      .container { padding: 12px; }
      .person-header { padding: 12px; flex-wrap: wrap; }
      .person-children { padding-left: 16px; }
      .action-btns { width: 100%; justify-content: flex-start; }
    }
  </style>
</head>
<body>

<header>
  <h1 id="headerTitle">Team Viewer</h1>
  <div class="header-stats">
    Total: <span id="totalCount">0</span> &nbsp;|&nbsp;
    Direct: <span id="directCount">0</span> &nbsp;|&nbsp;
    Funded: <span id="fundedCount">0</span>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search by name...">
    <button class="btn btn-outline" id="expandAllBtn">Expand All</button>
    <button class="btn btn-outline" id="collapseAllBtn">Collapse All</button>
  </div>
</header>

<div class="breadcrumb" id="breadcrumb"></div>

<div class="container">
  <div class="move-banner" id="moveBanner">
    <span id="moveBannerText">Moving: ...</span>
    <button class="btn btn-outline" id="cancelMoveBtn">Cancel</button>
  </div>

  <div class="top-actions">
    <button class="btn" id="backBtn" style="display:none;">&#8592; Back</button>
    <button class="btn btn-success" id="addMemberBtn">+ Add Member</button>
    <button class="btn btn-danger" id="clearAllBtn">Clear All</button>
    <button class="btn btn-outline" id="exportBtn">Export JSON</button>
    <button class="btn btn-outline" id="importBtn">Import JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none;">
  </div>

  <div id="tree"></div>
</div>

<!-- Add/Rename Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add Member</h2>
    <input type="text" id="modalNameInput" placeholder="Enter name...">
    <label><input type="checkbox" id="modalFundedInput" checked> Funded</label>
    <div class="modal-actions">
      <button class="btn btn-outline" id="modalCancel">Cancel</button>
      <button class="btn" id="modalConfirm">Add</button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmOverlay">
  <div class="modal">
    <h2 id="confirmTitle">Are you sure?</h2>
    <p id="confirmText" style="color:#aaa;margin-bottom:16px;"></p>
    <div class="modal-actions">
      <button class="btn btn-outline" id="confirmCancel">Cancel</button>
      <button class="btn btn-danger" id="confirmYes">Confirm</button>
    </div>
  </div>
</div>

// ---- Data persistence ----
const STORAGE_KEY = 'team_viewer_data';

function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { return JSON.parse(saved); } catch(e) {}
  }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
  rebuildIndex();
}

let DATA = loadData();

// ---- Index ----
let nodeIndex = {};
let parentIndex = {};

function rebuildIndex() {
  nodeIndex = {};
  parentIndex = {};
  indexTree(DATA, null);
}

function indexTree(node, parent) {
  nodeIndex[node.id] = node;
  if (parent) parentIndex[node.id] = parent.id;
  if (node.children) node.children.forEach(c => indexTree(c, node));
}
rebuildIndex();

// ---- Helpers ----
function countTotal(node) {
  let c = 0;
  if (node.children) { c += node.children.length; node.children.forEach(n => { c += countTotal(n); }); }
  return c;
}

function countFunded(node) {
  let c = node.fd ? 1 : 0;
  if (node.children) node.children.forEach(n => { c += countFunded(n); });
  return c;
}

function getDirectCount(node) { return node.children ? node.children.length : 0; }

function cleanName(name) {
  return name.replace(/\s*Level\s*\d+.*/i, '').replace(/\s*-\s*third.*/i, '')
    .replace(/\s*-\s*level.*/i, '').replace(/\s*\(Head\).*/i, '').replace(/\n/g, '').trim();
}

function getInitials(name) {
  const clean = cleanName(name);
  const parts = clean.split(/\s+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return clean.substring(0, 2).toUpperCase();
}

function getAvatarClass(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash) + name.charCodeAt(i);
  return 'av-' + (Math.abs(hash) % 8 + 1);
}

function getPath(nodeId) {
  const path = [];
  let current = nodeId;
  while (current) { path.unshift(nodeIndex[current]); current = parentIndex[current]; }
  return path;
}

function generateId(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') + '-' + Math.random().toString(36).substr(2, 4);
}

function removeFromParent(nodeId) {
  const pid = parentIndex[nodeId];
  if (!pid) return false;
  const parent = nodeIndex[pid];
  if (!parent || !parent.children) return false;
  parent.children = parent.children.filter(c => c.id !== nodeId);
  return true;
}

function isDescendant(ancestorId, nodeId) {
  let current = nodeId;
  while (current) {
    if (current === ancestorId) return true;
    current = parentIndex[current];
  }
  return false;
}

// ---- State ----
let currentRoot = DATA;
let navStack = [];
let movingNode = null;

// ---- Modal helpers ----
function showModal(title, confirmText, name, funded, callback) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalConfirm').textContent = confirmText;
  document.getElementById('modalNameInput').value = name || '';
  document.getElementById('modalFundedInput').checked = funded !== false;
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('modalNameInput').focus();
  window._modalCallback = callback;
}

function hideModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  window._modalCallback = null;
}

function showConfirm(title, text, callback) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmText').textContent = text;
  document.getElementById('confirmOverlay').classList.add('active');
  window._confirmCallback = callback;
}

function hideConfirm() {
  document.getElementById('confirmOverlay').classList.remove('active');
  window._confirmCallback = null;
}

// ---- Render ----
function renderTree(container, nodes, searchTerm) {
  container.innerHTML = '';
  if (!nodes || nodes.length === 0) {
    container.innerHTML = '<div class="no-results">No team members found</div>';
    return;
  }

  nodes.forEach(node => {
    const hasChildren = node.children && node.children.length > 0;
    const totalBelow = countTotal(node);
    const directBelow = getDirectCount(node);

    const card = document.createElement('div');
    card.className = 'person-card';
    card.dataset.id = node.id;
    if (node.fd) card.classList.add('funded-card');
    else card.classList.add('unfunded');
    if (movingNode && movingNode.id === node.id) card.classList.add('moving');
    if (searchTerm && cleanName(node.name).toLowerCase().includes(searchTerm.toLowerCase())) card.classList.add('highlight');

    const header = document.createElement('div');
    header.className = 'person-header';

    // Avatar
    const avatar = document.createElement('div');
    avatar.className = `avatar ${getAvatarClass(node.name)}`;
    avatar.textContent = getInitials(node.name);
    const dot = document.createElement('div');
    dot.className = `funded-dot ${node.fd ? 'yes' : 'no'}`;
    avatar.appendChild(dot);

    // Info
    const info = document.createElement('div');
    info.className = 'person-info';
    const nameEl = document.createElement('div');
    nameEl.className = 'person-name';
    nameEl.textContent = cleanName(node.name);
    const meta = document.createElement('div');
    meta.className = 'person-meta';
    let metaHTML = node.fd
      ? '<span class="tag funded-tag">Funded</span>'
      : '<span class="tag unfunded-tag">Not Funded</span>';
    if (hasChildren) metaHTML += ` <span class="tag">${directBelow} direct</span> <span class="tag">${totalBelow} total</span>`;
    meta.innerHTML = metaHTML;
    info.appendChild(nameEl);
    info.appendChild(meta);

    // Action buttons
    const actions = document.createElement('div');
    actions.className = 'action-btns';

    if (movingNode && movingNode.id !== node.id && !isDescendant(movingNode.id, node.id)) {
      const moveHereBtn = document.createElement('button');
      moveHereBtn.className = 'action-btn move-here';
      moveHereBtn.textContent = 'Move Here';
      moveHereBtn.addEventListener('click', (e) => { e.stopPropagation(); moveNodeTo(node); });
      actions.appendChild(moveHereBtn);
    }

    if (!movingNode) {
      // Rename
      const renameBtn = document.createElement('button');
      renameBtn.className = 'action-btn';
      renameBtn.textContent = 'Rename';
      renameBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        showModal('Rename Member', 'Save', node.name, node.fd, (newName, funded) => {
          node.name = newName;
          node.fd = funded;
          saveData();
          updateView();
        });
      });

      // Toggle funded
      const fundBtn = document.createElement('button');
      fundBtn.className = 'action-btn';
      fundBtn.textContent = node.fd ? 'Unfund' : 'Fund';
      fundBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        node.fd = !node.fd;
        saveData();
        updateView();
      });

      // Add child
      const addBtn = document.createElement('button');
      addBtn.className = 'action-btn';
      addBtn.textContent = '+ Add';
      addBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        showModal('Add Member under ' + cleanName(node.name), 'Add', '', true, (newName, funded) => {
          if (!node.children) node.children = [];
          node.children.push({ id: generateId(newName), name: newName, fd: funded });
          saveData();
          updateView();
        });
      });

      // Move
      const moveBtn = document.createElement('button');
      moveBtn.className = 'action-btn';
      moveBtn.textContent = 'Move';
      moveBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        movingNode = node;
        updateView();
      });

      // Delete
      const delBtn = document.createElement('button');
      delBtn.className = 'action-btn';
      delBtn.textContent = 'Delete';
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const total = countTotal(node);
        const msg = total > 0
          ? `This will remove ${cleanName(node.name)} and ${total} people in their downline.`
          : `This will remove ${cleanName(node.name)}.`;
        showConfirm('Delete Member', msg, () => {
          removeFromParent(node.id);
          saveData();
          updateView();
        });
      });

      actions.appendChild(renameBtn);
      actions.appendChild(fundBtn);
      actions.appendChild(addBtn);
      actions.appendChild(moveBtn);
      actions.appendChild(delBtn);
    }

    header.appendChild(avatar);
    header.appendChild(info);
    header.appendChild(actions);

    if (hasChildren && !movingNode) {
      const expandIcon = document.createElement('div');
      expandIcon.className = 'expand-icon';
      expandIcon.innerHTML = '&#9654;';
      header.appendChild(expandIcon);

      const childContainer = document.createElement('div');
      childContainer.className = 'person-children';

      expandIcon.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = childContainer.classList.toggle('open');
        expandIcon.classList.toggle('open', isOpen);
        if (isOpen && childContainer.children.length === 0) {
          renderTree(childContainer, node.children, searchTerm);
        }
      });

      // View team button
      const viewBtn = document.createElement('button');
      viewBtn.className = 'action-btn';
      viewBtn.textContent = 'View Team';
      viewBtn.style.color = '#6c63ff';
      viewBtn.style.borderColor = '#6c63ff';
      viewBtn.addEventListener('click', (e) => { e.stopPropagation(); navigateTo(node); });
      actions.appendChild(viewBtn);

      card.appendChild(header);
      card.appendChild(childContainer);
    } else {
      card.appendChild(header);
    }

    container.appendChild(card);
  });
}

function moveNodeTo(targetParent) {
  if (!movingNode) return;
  removeFromParent(movingNode.id);
  if (!targetParent.children) targetParent.children = [];
  targetParent.children.push(movingNode);
  movingNode = null;
  saveData();
  updateView();
}

function navigateTo(node) {
  navStack.push(currentRoot);
  currentRoot = node;
  movingNode = null;
  updateView();
}

function goBack() {
  if (navStack.length > 0) { currentRoot = navStack.pop(); movingNode = null; updateView(); }
}

function updateView() {
  const container = document.getElementById('tree');
  const searchInput = document.getElementById('searchInput');
  const backBtn = document.getElementById('backBtn');
  const breadcrumb = document.getElementById('breadcrumb');
  const moveBanner = document.getElementById('moveBanner');

  searchInput.value = '';

  document.getElementById('totalCount').textContent = countTotal(currentRoot);
  document.getElementById('directCount').textContent = getDirectCount(currentRoot);
  document.getElementById('fundedCount').textContent = countFunded(currentRoot) - (currentRoot.fd ? 1 : 0);
  document.getElementById('headerTitle').textContent = cleanName(currentRoot.name) + "'s Team";

  backBtn.style.display = navStack.length > 0 ? 'inline-block' : 'none';

  // Move banner
  if (movingNode) {
    moveBanner.classList.add('active');
    document.getElementById('moveBannerText').textContent = 'Moving: ' + cleanName(movingNode.name) + ' — click "Move Here" on the new parent';
  } else {
    moveBanner.classList.remove('active');
  }

  // Breadcrumb
  const path = getPath(currentRoot.id);
  if (path.length > 1) {
    breadcrumb.classList.add('active');
    breadcrumb.innerHTML = path.map((p, i) => {
      if (i === path.length - 1) return `<span class="current">${cleanName(p.name)}</span>`;
      return `<span onclick="jumpTo('${p.id}')">${cleanName(p.name)}</span><span class="sep">/</span>`;
    }).join('');
  } else {
    breadcrumb.classList.remove('active');
  }

  renderTree(container, currentRoot.children || [], '');
}

window.jumpTo = function(nodeId) {
  const node = nodeIndex[nodeId];
  if (!node) return;
  navStack = [];
  const fullPath = getPath(nodeId);
  for (let i = 0; i < fullPath.length - 1; i++) navStack.push(fullPath[i]);
  currentRoot = node;
  movingNode = null;
  updateView();
};

// ---- Search ----
function searchTree(node, term) {
  const results = [];
  if (cleanName(node.name).toLowerCase().includes(term)) results.push(node);
  if (node.children) node.children.forEach(c => { results.push(...searchTree(c, term)); });
  return results;
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  const term = e.target.value.trim().toLowerCase();
  const container = document.getElementById('tree');
  if (!term) { renderTree(container, currentRoot.children || [], ''); return; }
  renderTree(container, searchTree(currentRoot, term), term);
});

// ---- Button handlers ----
document.getElementById('backBtn').addEventListener('click', goBack);
document.getElementById('cancelMoveBtn').addEventListener('click', () => { movingNode = null; updateView(); });

document.getElementById('addMemberBtn').addEventListener('click', () => {
  showModal('Add Member to ' + cleanName(currentRoot.name), 'Add', '', true, (newName, funded) => {
    if (!currentRoot.children) currentRoot.children = [];
    currentRoot.children.push({ id: generateId(newName), name: newName, fd: funded });
    saveData();
    updateView();
  });
});

document.getElementById('clearAllBtn').addEventListener('click', () => {
  showConfirm('Clear Entire Hierarchy', 'This will remove ALL members under ' + cleanName(currentRoot.name) + '. This cannot be undone.', () => {
    currentRoot.children = [];
    saveData();
    updateView();
  });
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'team-data.json';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importFile').click();
});

document.getElementById('importFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.id || !imported.name) { alert('Invalid JSON format'); return; }
      DATA = imported;
      currentRoot = DATA;
      navStack = [];
      movingNode = null;
      saveData();
      updateView();
    } catch(err) { alert('Failed to parse JSON: ' + err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('expandAllBtn').addEventListener('click', () => {
  document.querySelectorAll('.person-children').forEach(el => {
    el.classList.add('open');
    if (el.children.length === 0) {
      const cardId = el.parentElement.dataset.id;
      const node = nodeIndex[cardId];
      if (node && node.children) renderTree(el, node.children, '');
    }
  });
  document.querySelectorAll('.expand-icon').forEach(el => el.classList.add('open'));
});

document.getElementById('collapseAllBtn').addEventListener('click', () => {
  document.querySelectorAll('.person-children').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.expand-icon').forEach(el => el.classList.remove('open'));
});

// ---- Modal events ----
document.getElementById('modalCancel').addEventListener('click', hideModal);
document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) hideModal(); });
document.getElementById('modalConfirm').addEventListener('click', () => {
  const name = document.getElementById('modalNameInput').value.trim();
  const funded = document.getElementById('modalFundedInput').checked;
  if (!name) return;
  if (window._modalCallback) window._modalCallback(name, funded);
  hideModal();
});
document.getElementById('modalNameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('modalConfirm').click();
});

document.getElementById('confirmCancel').addEventListener('click', hideConfirm);
document.getElementById('confirmOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) hideConfirm(); });
document.getElementById('confirmYes').addEventListener('click', () => {
  if (window._confirmCallback) window._confirmCallback();
  hideConfirm();
});

// Init
updateView();
