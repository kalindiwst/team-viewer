<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="My Team">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <title>My Team</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ---- Landing screen ---- */
    .landing {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; padding: 24px; text-align: center;
    }

    .landing h1 { font-size: 28px; color: #fff; margin-bottom: 6px; }
    .landing p { color: #8888aa; font-size: 15px; margin-bottom: 24px; }

    .landing-search {
      width: 100%; max-width: 420px; position: relative;
    }

    .landing-search input {
      width: 100%; padding: 14px 18px; border-radius: 10px;
      border: 1px solid #2a2a4a; background: #111; color: #e0e0e0;
      font-size: 16px; outline: none; transition: border-color 0.2s;
    }
    .landing-search input:focus { border-color: #6c63ff; }
    .landing-search input::placeholder { color: #555; }

    .landing-results {
      width: 100%; max-width: 420px; margin-top: 8px; max-height: 400px;
      overflow-y: auto; border-radius: 10px; border: 1px solid #1e1e30;
      background: #111119; display: none;
    }
    .landing-results.active { display: block; }

    .landing-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      cursor: pointer; border-bottom: 1px solid #1a1a2e; transition: background 0.15s;
    }
    .landing-item:last-child { border-bottom: none; }
    .landing-item:hover { background: #1a1a2e; }

    .landing-item .avatar {
      width: 36px; height: 36px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-weight: 700;
      font-size: 14px; color: #fff; flex-shrink: 0;
    }

    .landing-item-info { text-align: left; }
    .landing-item-name { font-size: 15px; font-weight: 600; color: #e0e0e0; }
    .landing-item-path { font-size: 12px; color: #666; margin-top: 1px; }

    /* ---- Team view ---- */
    .team-view { display: none; }
    .team-view.active { display: block; }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 20px 24px; border-bottom: 1px solid #2a2a4a;
      position: sticky; top: 0; z-index: 100;
    }

    .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .header-top h1 { font-size: 22px; font-weight: 700; color: #fff; flex: 1; }

    .change-btn {
      padding: 8px 14px; border-radius: 8px; border: 1px solid #2a2a4a;
      background: transparent; color: #8888aa; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .change-btn:hover { background: #1a1a2e; color: #e0e0e0; }

    .me-card {
      display: flex; align-items: center; gap: 14px;
      background: rgba(108,99,255,0.1); border: 1px solid #6c63ff;
      border-radius: 10px; padding: 14px 18px; margin-bottom: 12px;
    }

    .me-avatar {
      width: 50px; height: 50px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-weight: 700;
      font-size: 20px; color: #fff; flex-shrink: 0; position: relative;
    }

    .me-info { flex: 1; }
    .me-name { font-size: 18px; font-weight: 700; color: #fff; }
    .me-stats { font-size: 13px; color: #8888aa; margin-top: 4px; }
    .me-stats span { color: #6c63ff; font-weight: 600; }

    .funded-dot {
      position: absolute; bottom: -1px; right: -1px; width: 14px; height: 14px;
      border-radius: 50%; border: 2px solid #16213e;
    }
    .funded-dot.yes { background: #28a745; }
    .funded-dot.no { background: #dc3545; }

    .header-stats { font-size: 13px; color: #8888aa; margin-bottom: 12px; }
    .header-stats span { color: #6c63ff; font-weight: 600; }

    .search-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .search-bar input {
      flex: 1; min-width: 180px; padding: 10px 14px; border-radius: 8px;
      border: 1px solid #2a2a4a; background: #111; color: #e0e0e0;
      font-size: 14px; outline: none;
    }
    .search-bar input:focus { border-color: #6c63ff; }
    .search-bar input::placeholder { color: #555; }

    .btn {
      padding: 10px 16px; border-radius: 8px; border: none;
      background: #6c63ff; color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    .btn:hover { background: #5a52d5; }
    .btn-outline { background: transparent; border: 1px solid #2a2a4a; color: #8888aa; }
    .btn-outline:hover { background: #1a1a2e; color: #e0e0e0; }

    .breadcrumb {
      padding: 10px 24px; background: #0f0f1a; border-bottom: 1px solid #1a1a2e;
      font-size: 13px; color: #666; display: none;
    }
    .breadcrumb.active { display: block; }
    .breadcrumb span { cursor: pointer; color: #6c63ff; }
    .breadcrumb span:hover { color: #8a83ff; }
    .breadcrumb .sep { color: #333; cursor: default; margin: 0 6px; }
    .breadcrumb .current { color: #e0e0e0; cursor: default; }

    .container { max-width: 900px; margin: 0 auto; padding: 16px; }

    .top-actions { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }

    .person-card {
      background: #111119; border: 1px solid #1e1e30; border-radius: 10px;
      margin-bottom: 8px; overflow: hidden; transition: border-color 0.2s;
    }
    .person-card:hover { border-color: #2a2a4a; }
    .person-card.highlight { border-color: #6c63ff; background: #14142a; }
    .person-card.unfunded { border-left: 3px solid #dc3545; }
    .person-card.funded-card { border-left: 3px solid #28a745; }

    .person-header {
      display: flex; align-items: center; padding: 14px 16px;
      gap: 12px; user-select: none;
    }

    .avatar {
      width: 38px; height: 38px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-weight: 700;
      font-size: 15px; color: #fff; flex-shrink: 0; position: relative;
    }

    .person-info { flex: 1; min-width: 0; }
    .person-name {
      font-size: 15px; font-weight: 600; color: #e0e0e0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .person-meta { font-size: 12px; color: #666; margin-top: 2px; }
    .person-meta .tag {
      display: inline-block; padding: 1px 6px; border-radius: 4px;
      background: #1a1a2e; color: #6c63ff; font-size: 11px; font-weight: 600; margin-right: 4px;
    }
    .person-meta .funded-tag { background: #1a2e1a; color: #28a745; }
    .person-meta .unfunded-tag { background: #2e1a1a; color: #dc3545; }

    .view-team-btn {
      padding: 6px 12px; border-radius: 6px; border: 1px solid #6c63ff;
      background: transparent; color: #6c63ff; font-size: 12px; font-weight: 600;
      cursor: pointer; flex-shrink: 0; transition: all 0.2s; white-space: nowrap;
    }
    .view-team-btn:hover { background: #6c63ff; color: #fff; }

    .expand-icon {
      width: 24px; height: 24px; display: flex; align-items: center;
      justify-content: center; color: #555; flex-shrink: 0; font-size: 18px;
      transition: transform 0.2s; cursor: pointer;
    }
    .expand-icon.open { transform: rotate(90deg); }

    .person-children { padding: 0 0 8px 24px; display: none; }
    .person-children.open { display: block; }

    .no-results { text-align: center; padding: 60px 20px; color: #555; font-size: 15px; }

    .av-1 { background: #6c63ff; } .av-2 { background: #ff6b6b; }
    .av-3 { background: #ffa726; } .av-4 { background: #26a69a; }
    .av-5 { background: #42a5f5; } .av-6 { background: #ab47bc; }
    .av-7 { background: #ec407a; } .av-8 { background: #7e57c2; }

    @media (max-width: 600px) {
      .landing h1 { font-size: 22px; }
      header { padding: 16px; }
      .container { padding: 12px; }
      .person-header { padding: 12px; }
      .person-children { padding-left: 16px; }
      .me-card { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

<!-- ===== LANDING SCREEN ===== -->
<div class="landing" id="landingScreen">
  <h1>Find Your Team</h1>
  <p>Search your name to view your downline</p>
  <div class="landing-search">
    <input type="text" id="landingInput" placeholder="Type your name..." autofocus>
  </div>
  <div class="landing-results" id="landingResults"></div>
</div>

<!-- ===== TEAM VIEW ===== -->
<div class="team-view" id="teamView">
  <header>
    <div class="header-top">
      <h1 id="headerTitle">My Team</h1>
      <button class="change-btn" id="changePerson">Change Person</button>
    </div>
    <div id="meCard"></div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search your team...">
      <button class="btn btn-outline" id="expandAllBtn">Expand All</button>
      <button class="btn btn-outline" id="collapseAllBtn">Collapse All</button>
    </div>
  </header>

  <div class="breadcrumb" id="breadcrumb"></div>

  <div class="container">
    <div class="top-actions">
      <button class="btn" id="backBtn" style="display:none;">&#8592; Back</button>
    </div>
    <div id="tree"></div>
  </div>
</div>

// ---- Index ----
const nodeIndex = {};
const parentIndex = {};
const allNodes = [];

function indexTree(node, parent) {
  nodeIndex[node.id] = node;
  if (parent) parentIndex[node.id] = parent.id;
  allNodes.push(node);
  if (node.children) node.children.forEach(c => indexTree(c, node));
}
indexTree(DATA, null);

// ---- Helpers ----
function countTotal(node) {
  let c = 0;
  if (node.children) { c += node.children.length; node.children.forEach(n => { c += countTotal(n); }); }
  return c;
}
function countFunded(node) {
  let c = node.fd ? 1 : 0;
  if (node.children) node.children.forEach(n => { c += countFunded(n); });
  return c;
}
function getDirectCount(node) { return node.children ? node.children.length : 0; }

function cleanName(name) {
  return name.replace(/\s*Level\s*\d+.*/i, '').replace(/\s*-\s*third.*/i, '')
    .replace(/\s*-\s*level.*/i, '').replace(/\s*\(Head\).*/i, '').replace(/\n/g, '').trim();
}
function getInitials(name) {
  const clean = cleanName(name);
  const parts = clean.split(/\s+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return clean.substring(0, 2).toUpperCase();
}
function getAvatarClass(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash) + name.charCodeAt(i);
  return 'av-' + (Math.abs(hash) % 8 + 1);
}
function getPath(nodeId) {
  const path = [];
  let current = nodeId;
  while (current) { path.unshift(nodeIndex[current]); current = parentIndex[current]; }
  return path;
}
function getPathString(nodeId) {
  return getPath(nodeId).map(n => cleanName(n.name)).join(' > ');
}

// ---- State ----
let selectedPerson = null;
let currentRoot = null;
let navStack = [];

// Check URL for direct link
const params = new URLSearchParams(window.location.search);
if (params.get('id') && nodeIndex[params.get('id')]) {
  selectPerson(nodeIndex[params.get('id')]);
}

// ---- Landing ----
const landingInput = document.getElementById('landingInput');
const landingResults = document.getElementById('landingResults');

landingInput.addEventListener('input', () => {
  const term = landingInput.value.trim().toLowerCase();
  landingResults.innerHTML = '';

  if (!term) { landingResults.classList.remove('active'); return; }

  const matches = allNodes.filter(n => cleanName(n.name).toLowerCase().includes(term)).slice(0, 20);

  if (matches.length === 0) {
    landingResults.classList.add('active');
    landingResults.innerHTML = '<div style="padding:16px;color:#555;text-align:center;">No matches found</div>';
    return;
  }

  landingResults.classList.add('active');
  matches.forEach(node => {
    const item = document.createElement('div');
    item.className = 'landing-item';
    item.innerHTML = `
      <div class="avatar ${getAvatarClass(node.name)}">${getInitials(node.name)}</div>
      <div class="landing-item-info">
        <div class="landing-item-name">${cleanName(node.name)}</div>
        <div class="landing-item-path">${getPathString(node.id)}</div>
      </div>
    `;
    item.addEventListener('click', () => selectPerson(node));
    landingResults.appendChild(item);
  });
});

function selectPerson(node) {
  selectedPerson = node;
  currentRoot = node;
  navStack = [];

  // Update URL without reload
  const url = new URL(window.location);
  url.searchParams.set('id', node.id);
  window.history.pushState({}, '', url);

  document.getElementById('landingScreen').style.display = 'none';
  document.getElementById('teamView').classList.add('active');
  updateView();
}

document.getElementById('changePerson').addEventListener('click', () => {
  document.getElementById('teamView').classList.remove('active');
  document.getElementById('landingScreen').style.display = 'flex';
  landingInput.value = '';
  landingResults.classList.remove('active');
  landingResults.innerHTML = '';
  landingInput.focus();
  const url = new URL(window.location);
  url.searchParams.delete('id');
  window.history.pushState({}, '', url);
});

// ---- Render tree ----
function renderTree(container, nodes, searchTerm) {
  container.innerHTML = '';
  if (!nodes || nodes.length === 0) {
    container.innerHTML = '<div class="no-results">No team members yet</div>';
    return;
  }

  nodes.forEach(node => {
    const hasChildren = node.children && node.children.length > 0;
    const totalBelow = countTotal(node);
    const directBelow = getDirectCount(node);

    const card = document.createElement('div');
    card.className = 'person-card';
    card.dataset.id = node.id;
    if (node.fd) card.classList.add('funded-card');
    else card.classList.add('unfunded');
    if (searchTerm && cleanName(node.name).toLowerCase().includes(searchTerm.toLowerCase())) card.classList.add('highlight');

    const header = document.createElement('div');
    header.className = 'person-header';

    const avatar = document.createElement('div');
    avatar.className = `avatar ${getAvatarClass(node.name)}`;
    avatar.textContent = getInitials(node.name);
    const dot = document.createElement('div');
    dot.className = `funded-dot ${node.fd ? 'yes' : 'no'}`;
    avatar.appendChild(dot);

    const info = document.createElement('div');
    info.className = 'person-info';
    const nameEl = document.createElement('div');
    nameEl.className = 'person-name';
    nameEl.textContent = cleanName(node.name);
    const meta = document.createElement('div');
    meta.className = 'person-meta';
    let metaHTML = node.fd
      ? '<span class="tag funded-tag">Funded</span>'
      : '<span class="tag unfunded-tag">Not Funded</span>';
    if (hasChildren) metaHTML += ` <span class="tag">${directBelow} direct</span> <span class="tag">${totalBelow} total</span>`;
    meta.innerHTML = metaHTML;
    info.appendChild(nameEl);
    info.appendChild(meta);

    header.appendChild(avatar);
    header.appendChild(info);

    if (hasChildren) {
      const viewBtn = document.createElement('button');
      viewBtn.className = 'view-team-btn';
      viewBtn.textContent = 'View Team';
      viewBtn.addEventListener('click', (e) => { e.stopPropagation(); navigateTo(node); });
      header.appendChild(viewBtn);

      const expandIcon = document.createElement('div');
      expandIcon.className = 'expand-icon';
      expandIcon.innerHTML = '&#9654;';
      header.appendChild(expandIcon);

      const childContainer = document.createElement('div');
      childContainer.className = 'person-children';

      const clickTarget = (e) => {
        if (e.target.closest('.view-team-btn')) return;
        const isOpen = childContainer.classList.toggle('open');
        expandIcon.classList.toggle('open', isOpen);
        if (isOpen && childContainer.children.length === 0) {
          renderTree(childContainer, node.children, searchTerm);
        }
      };
      expandIcon.addEventListener('click', (e) => { e.stopPropagation(); clickTarget(e); });
      header.addEventListener('click', clickTarget);

      card.appendChild(header);
      card.appendChild(childContainer);
    } else {
      card.appendChild(header);
    }

    container.appendChild(card);
  });
}

function navigateTo(node) {
  navStack.push(currentRoot);
  currentRoot = node;
  updateView();
}

function goBack() {
  if (navStack.length > 0) { currentRoot = navStack.pop(); updateView(); }
}

function updateView() {
  const container = document.getElementById('tree');
  const backBtn = document.getElementById('backBtn');
  const breadcrumb = document.getElementById('breadcrumb');
  const searchInput = document.getElementById('searchInput');

  searchInput.value = '';

  const total = countTotal(currentRoot);
  const direct = getDirectCount(currentRoot);
  const funded = countFunded(currentRoot) - (currentRoot.fd ? 1 : 0);

  // Me card
  const meCard = document.getElementById('meCard');
  meCard.innerHTML = `
    <div class="me-card">
      <div class="me-avatar ${getAvatarClass(currentRoot.name)}">
        ${getInitials(currentRoot.name)}
        <div class="funded-dot ${currentRoot.fd ? 'yes' : 'no'}"></div>
      </div>
      <div class="me-info">
        <div class="me-name">${cleanName(currentRoot.name)}</div>
        <div class="me-stats">
          <span>${direct}</span> direct &nbsp;|&nbsp;
          <span>${total}</span> total downline &nbsp;|&nbsp;
          <span>${funded}</span> funded
        </div>
      </div>
    </div>
  `;

  document.getElementById('headerTitle').textContent = cleanName(currentRoot.name) + "'s Team";

  backBtn.style.display = navStack.length > 0 ? 'inline-block' : 'none';

  // Breadcrumb (relative to selected person)
  if (navStack.length > 0) {
    breadcrumb.classList.add('active');
    const crumbs = [selectedPerson, ...navStack.slice(1), currentRoot];
    breadcrumb.innerHTML = crumbs.map((p, i) => {
      if (i === crumbs.length - 1) return `<span class="current">${cleanName(p.name)}</span>`;
      return `<span data-idx="${i}">${cleanName(p.name)}</span><span class="sep">/</span>`;
    }).join('');
    breadcrumb.querySelectorAll('span[data-idx]').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx);
        currentRoot = crumbs[idx];
        navStack = navStack.slice(0, idx);
        updateView();
      });
    });
  } else {
    breadcrumb.classList.remove('active');
  }

  renderTree(container, currentRoot.children || [], '');
}

// ---- Search within team ----
function searchTree(node, term) {
  const results = [];
  if (cleanName(node.name).toLowerCase().includes(term)) results.push(node);
  if (node.children) node.children.forEach(c => { results.push(...searchTree(c, term)); });
  return results;
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  const term = e.target.value.trim().toLowerCase();
  const container = document.getElementById('tree');
  if (!term) { renderTree(container, currentRoot.children || [], ''); return; }
  renderTree(container, searchTree(currentRoot, term), term);
});

// ---- Buttons ----
document.getElementById('backBtn').addEventListener('click', goBack);

document.getElementById('expandAllBtn').addEventListener('click', () => {
  document.querySelectorAll('.person-children').forEach(el => {
    el.classList.add('open');
    if (el.children.length === 0) {
      const cardId = el.parentElement.dataset.id;
      const node = nodeIndex[cardId];
      if (node && node.children) renderTree(el, node.children, '');
    }
  });
  document.querySelectorAll('.expand-icon').forEach(el => el.classList.add('open'));
});

document.getElementById('collapseAllBtn').addEventListener('click', () => {
  document.querySelectorAll('.person-children').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.expand-icon').forEach(el => el.classList.remove('open'));
});
</script>
